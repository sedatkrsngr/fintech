services:
  identity-postgres:
    image: postgres:17
    container_name: fintech-identity-postgres
    environment:
      POSTGRES_DB: fintech_identity_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - identity-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fintech_identity_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  identity-postgres-data:
