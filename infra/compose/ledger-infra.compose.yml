services:
  ledger-postgres:
    image: postgres:17
    container_name: fintech-ledger-postgres
    environment:
      POSTGRES_DB: fintech_ledger_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - ledger-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fintech_ledger_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  ledger-postgres-data:
