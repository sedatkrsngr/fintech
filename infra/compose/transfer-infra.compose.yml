services:
  transfer-postgres:
    image: postgres:17
    container_name: fintech-transfer-postgres
    environment:
      POSTGRES_DB: fintech_transfer_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - transfer-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fintech_transfer_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  transfer-postgres-data:
